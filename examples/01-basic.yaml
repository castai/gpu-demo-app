apiVersion: v1
kind: Namespace
metadata:
  name: gpu-demo-basic
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: gpu-demo-app
  namespace: gpu-demo-basic
spec:
  spec:
    devices:
      requests:
      - name: gpu-0
        exactly:
          deviceClassName: gpu.nvidia.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-demo-app
  namespace: gpu-demo-basic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-demo-app
  template:
    metadata:
      labels:
        app: gpu-demo-app
    spec:
      resourceClaims:
      - name: gpu-0
        resourceClaimTemplateName: gpu-demo-app
      containers:
      - name: gpu-demo-app
        image: ghcr.io/castai/gpu-demo-app:latest
        ports:
        - containerPort: 5000
        resources:
          claims:
          - name: gpu-0
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule

---
apiVersion: v1
kind: Service
metadata:
  name: gpu-demo-service
  namespace: gpu-demo-basic
spec:
  selector:
    app: gpu-demo-app
  ports:
  - port: 80
    targetPort: 5000
