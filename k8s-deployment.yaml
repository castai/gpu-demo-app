apiVersion: v1
kind: Namespace
metadata:
  name: gpu-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-demo-app
  namespace: gpu-demo
  labels:
    app: gpu-demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-demo-app
  template:
    metadata:
      labels:
        app: gpu-demo-app
    spec:
      containers:
      - name: gpu-demo-app
        image: ghcr.io/castai/gpu-demo-app:latest
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
            nvidia.com/gpu: 1
          limits:
            memory: "2Gi"
            cpu: "1"
            nvidia.com/gpu: 1
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
      nodeSelector:
        accelerator: nvidia-gpu
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
---
apiVersion: v1
kind: Service
metadata:
  name: gpu-demo-service
  namespace: gpu-demo
spec:
  selector:
    app: gpu-demo-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  type: ClusterIP
